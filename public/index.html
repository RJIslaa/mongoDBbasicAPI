<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RE Games API</title>
  <link rel="stylesheet" href="style.css">
<body>
  <main class="container">
    <h1>RE Games API</h1>
    <p>This page reads games from <code>/api/games</code> and lets you add a game.</p>
    <form id="game-form">
      <input name="name" placeholder="Name" required>
      <input name="year" type="number" min="1996" placeholder="Year" required>
      <input name="price" type="number" step="0.01" min="0" placeholder="Price" required>
      <input name="mainCharacter" placeholder="Main Character" required>
      <button type="submit">Add Game</button>
    </form>
    <p id="message"></p>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Year</th>
          <th>Price</th>
          <th>Main Character</th>
        </tr>
      </thead>
      <tbody id="games-body"></tbody>
    </table>
  </main>
  <script src="app.js"></script>
</body>
</html>
